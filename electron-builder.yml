appId: com.viking.app
productName: Viking

directories:
  output: release

files:
  - dist/**/*
  - public/**/*

# Native libraries must live outside ASAR so the OS can load them.
asarUnpack:
  - node_modules/@ff-labs/fff-bin-*/**/*
  - node_modules/@yuuang/ffi-rs-*/**/*

mac:
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64

win:
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: omavashia2005
  repo: viking
  releaseType: release
