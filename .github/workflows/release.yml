name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Build unpacked app
        run: npm run pack:mac

      - name: Smoke test unpacked app
        run: npm run smoke:packaged:mac -- release/mac-arm64/Viking.app

      - name: Build unsigned artifacts
        run: npm run dist:mac

      - name: Publish macOS assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          assets=(
            "release/Viking-${version}-arm64.dmg#Viking macOS installer (Apple Silicon)"
            "release/Viking-${version}-arm64.zip#Viking macOS app archive (Apple Silicon)"
          )
          for manifest in release/latest-mac.yml release/latest-mac-arm64.yml; do
            [ -f "$manifest" ] && assets+=("$manifest")
          done
          gh release view "$TAG_NAME" >/dev/null 2>&1 ||
            gh release create "$TAG_NAME" --verify-tag --generate-notes --latest ||
            gh release view "$TAG_NAME" >/dev/null
          gh release upload "$TAG_NAME" "${assets[@]}" --clobber

  windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Build Windows artifacts
        run: npm run dist:win

      - name: Publish Windows assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          assets=(
            "release/Viking-${version}-x64.exe#Viking Windows installer (x64)"
            "release/Viking-${version}-x64.zip#Viking Windows app archive (x64)"
            "release/latest.yml"
          )
          gh release view "$TAG_NAME" >/dev/null 2>&1 ||
            gh release create "$TAG_NAME" --verify-tag --generate-notes --latest ||
            gh release view "$TAG_NAME" >/dev/null
          gh release upload "$TAG_NAME" "${assets[@]}" --clobber
